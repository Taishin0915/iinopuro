{% load static %}

<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}勤怠管理システム{% endblock %}</title>

    <!-- PWA -->
    <link rel="manifest" href="{% static 'kintai/manifest.json' %}">
    <meta name="theme-color" content="#000000">
    <link rel="icon" href="{% static 'kintai/icons/icon-512x512.png' %}">
    <link rel="apple-touch-icon" href="{% static 'kintai/icons/icon-192x192.png' %}">

    <!-- アイコン -->
    <link rel="icon" href="{% static 'kintai/icons/icon-192x192.png' %}">
    <link rel="apple-touch-icon" href="{% static 'kintai/icons/icon-512x512.png' %}">

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'kintai/style.css' %}">
    {% block extra_head %}{% endblock %}
  </head>

  <body>
    {% block content %}{% endblock %}

    <script>
      // Service Worker 登録処理
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register("{% static 'kintai/service-worker.js' %}")
          .then(reg => console.log('Service Worker registered:', reg))
          .catch(err => console.error('Service Worker failed:', err));
      }
    </script>
  </body>
</html>
