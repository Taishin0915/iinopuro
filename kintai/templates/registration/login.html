{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ログイン - 勤怠管理システム</title>
    <style>
        * {
            margin: 0 !important;
            padding: 0 !important;
            box-sizing: border-box !important;
        }
        
        html, body {
            height: 100% !important;
            width: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%) !important;
            min-height: 100vh !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            font-family: 'Arial', sans-serif !important;
            position: relative !important;
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.1) !important;
            backdrop-filter: blur(20px) !important;
            border-radius: 20px !important;
            padding: 40px !important;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(0, 255, 136, 0.2) !important;
            max-width: 400px !important;
            width: 90% !important;
            text-align: center !important;
            margin: 0 auto !important;
        }
        
        .login-header {
            margin-bottom: 30px !important;
        }
        
        .login-header h1 {
            color: #00ff88 !important;
            font-size: 2.5em !important;
            margin: 0 0 10px 0 !important;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5) !important;
        }
        
        .login-header p {
            color: #888 !important;
            font-size: 1.1em !important;
            margin: 0 !important;
        }
        
        .form-group {
            margin-bottom: 20px !important;
            text-align: center !important;
        }
        
        .form-group label {
            display: block !important;
            color: #00ff88 !important;
            margin-bottom: 8px !important;
            font-weight: bold !important;
            font-size: 0.9em !important;
        }
        
        .form-group input {
            width: 100% !important;
            max-width: 300px !important;
            margin: 0 auto !important;
            padding: 12px 16px !important;
            border: 1px solid rgba(0, 255, 136, 0.3) !important;
            border-radius: 10px !important;
            background: rgba(255, 255, 255, 0.1) !important;
            color: #fff !important;
            font-size: 1em !important;
            transition: all 0.3s ease !important;
            display: block !important;
        }
        
        .form-group input:focus {
            outline: none !important;
            border-color: #00ff88 !important;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3) !important;
            background: rgba(255, 255, 255, 0.15) !important;
        }
        
        .form-group input::placeholder {
            color: #666 !important;
        }
        
        .login-button {
            width: 100% !important;
            max-width: 300px !important;
            margin: 20px auto 0 auto !important;
            padding: 14px !important;
            background: linear-gradient(45deg, rgba(0, 255, 136, 0.8), rgba(0, 255, 136, 0.6)) !important;
            border: none !important;
            border-radius: 10px !important;
            color: #000 !important;
            font-size: 1.1em !important;
            font-weight: bold !important;
            cursor: pointer !important;
            transition: all 0.3s ease !important;
            display: block !important;
        }
        
        .login-button:hover {
            background: linear-gradient(45deg, rgba(0, 255, 136, 1), rgba(0, 255, 136, 0.8)) !important;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5) !important;
            transform: translateY(-2px) !important;
        }
        
        .error-message {
            background: rgba(255, 0, 0, 0.1) !important;
            border: 1px solid rgba(255, 0, 0, 0.3) !important;
            border-radius: 10px !important;
            padding: 15px !important;
            margin-bottom: 20px !important;
            color: #ff6b6b !important;
            text-align: center !important;
        }
        
        .demo-info {
            margin-top: 30px !important;
            padding: 20px !important;
            background: rgba(0, 255, 136, 0.1) !important;
            border-radius: 10px !important;
            border: 1px solid rgba(0, 255, 136, 0.2) !important;
            text-align: center !important;
        }
        
        .demo-info .demo-label {
            color: #888 !important;
            font-size: 0.9em !important;
            margin-bottom: 5px !important;
        }
        
        .demo-info .demo-account {
            color: #fff !important;
            font-size: 1.1em !important;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>ログイン</h1>
            <p>勤怠管理システム</p>
        </div>

        {% if form.errors %}
            <div class="error-message">
                {% for field, errors in form.errors.items %}
                    {% for error in errors %}
                        <p>{{ error }}</p>
                    {% endfor %}
                {% endfor %}
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="{{ form.username.id_for_label }}">ユーザー名</label>
                <input type="text" 
                       name="{{ form.username.name }}" 
                       id="{{ form.username.id_for_label }}"
                       placeholder="ユーザー名を入力"
                       value="{{ form.username.value|default:'' }}"
                       required>
            </div>

            <div class="form-group">
                <label for="{{ form.password.id_for_label }}">パスワード</label>
                <input type="password" 
                       name="{{ form.password.name }}" 
                       id="{{ form.password.id_for_label }}"
                       placeholder="パスワードを入力"
                       required>
            </div>

            <button type="submit" class="login-button">ログイン</button>
        </form>

        <div class="demo-info">
            <div class="demo-label">デモアカウント</div>
            <div class="demo-account">admin / admin123</div>
        </div>
    </div>
</body>
</html>
