{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ログイン - 勤怠管理システム</title>
    <link rel="stylesheet" href="{% static 'kintai/style.css' %}">
</head>
<body>
    <header>
        <h1>ログイン</h1>
    </header>

    <main>
        <div class="welcome-message">
            <h2>勤怠管理システム</h2>
            <p>ログインしてください</p>
        </div>

        {% if form.errors %}
            <div class="error-message">
                {% for field, errors in form.errors.items %}
                    {% for error in errors %}
                        <p>{{ error }}</p>
                    {% endfor %}
                {% endfor %}
            </div>
        {% endif %}

        <form method="post" class="login-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="{{ form.username.id_for_label }}">ユーザー名</label>
                <input type="text" 
                       name="{{ form.username.name }}" 
                       id="{{ form.username.id_for_label }}"
                       placeholder="ユーザー名を入力"
                       value="{{ form.username.value|default:'' }}"
                       required>
            </div>

            <div class="form-group">
                <label for="{{ form.password.id_for_label }}">パスワード</label>
                <input type="password" 
                       name="{{ form.password.name }}" 
                       id="{{ form.password.id_for_label }}"
                       placeholder="パスワードを入力"
                       required>
            </div>

            <button type="submit" class="action-button">ログイン</button>
        </form>

        <div class="demo-info">
            <p>デモアカウント: admin / admin123</p>
        </div>
    </main>
</body>
</html>
