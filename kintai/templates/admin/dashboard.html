{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者画面 - {{ title }}</title>
    <link rel="stylesheet" href="{% static 'kintai/style.css' %}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            color: #fff;
        }
        
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .admin-header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .admin-header h1 {
            color: #00ff88;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }
        
        .admin-header p {
            color: #888;
            font-size: 1.1em;
        }
        
        .admin-nav {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }
        
        .nav-button {
            padding: 12px 24px;
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid rgba(0, 255, 136, 0.5);
            color: #00ff88;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        
        .nav-button:hover {
            background: rgba(0, 255, 136, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3);
        }
        
        .admin-content {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 15px;
            padding: 30px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 20px;
            border: 1px solid rgba(0, 255, 136, 0.1);
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
        
        .stat-label {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        
        .stat-value {
            color: #00ff88;
            font-size: 2em;
            font-weight: bold;
        }
        
        .logout-section {
            position: absolute;
            top: 20px;
            right: 20px;
        }
        
        .logout-button {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid rgba(255, 0, 0, 0.5);
            color: #ff6b6b;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }
        
        .logout-button:hover {
            background: rgba(255, 0, 0, 0.3);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="logout-section">
        <a href="{% url 'logout' %}" class="logout-button">ログアウト</a>
    </div>
    
    <div class="admin-container">
        <div class="admin-header">
            <h1>{{ title }}</h1>
            <p>管理者ダッシュボード</p>
        </div>
        
        <nav class="admin-nav">
            <a href="{% url 'admin_dashboard' %}" class="nav-button">ダッシュボード</a>
            <a href="{% url 'admin_users' %}" class="nav-button">ユーザー管理</a>
            <a href="{% url 'admin_reports' %}" class="nav-button">稼働管理</a>
            <a href="{% url 'admin_carriers' %}" class="nav-button">キャリア管理</a>
            <a href="{% url 'admin_analytics' %}" class="nav-button">分析</a>
        </nav>
        
        <div class="admin-content">
            {% block content %}
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">総ユーザー数</div>
                    <div class="stat-value">{{ total_users }}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">総レポート数</div>
                    <div class="stat-value">{{ total_reports }}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">今日のレポート数</div>
                    <div class="stat-value">{{ today_reports }}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">アクティブユーザー</div>
                    <div class="stat-value">{{ active_users }}</div>
                </div>
            </div>
            
            <div class="welcome-message">
                <h2>管理者ダッシュボードへようこそ</h2>
                <p>システムの概要と主要な統計情報を確認できます。</p>
            </div>
            {% endblock %}
        </div>
        
        <!-- MyPageに戻るボタン（下部） -->
        <div class="bottom-navigation" style="margin-top: 40px; text-align: center; padding: 20px;">
            <a href="{% url 'kintai_top' %}" class="nav-button" style="display: inline-block; padding: 12px 24px; background: rgba(0, 255, 136, 0.2); border: 1px solid rgba(0, 255, 136, 0.5); color: #00ff88; text-decoration: none; border-radius: 8px; transition: all 0.3s ease; font-weight: bold;">← MyPageに戻る</a>
        </div>
    </div>
</body>
</html>
