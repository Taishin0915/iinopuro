{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>プロフィール</title>
    <link rel="stylesheet" href="{% static 'kintai/style.css' %}">
    <style>
        .profile-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .profile-header h1 {
            color: #3b82f6;
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .profile-header p {
            color: #3b82f6;
            opacity: 0.8;
            font-size: 1.1em;
        }
        
        .profile-card {
            background: rgba(59, 130, 246, 0.1);
            border-radius: 15px;
            padding: 30px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }
        
        .user-info {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .user-info h2 {
            color: #3b82f6;
            font-size: 1.5em;
            margin-bottom: 10px;
        }
        
        .user-info p {
            color: #3b82f6;
            opacity: 0.8;
            font-size: 1em;
        }
        
        .password-form {
            margin-top: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            color: #3b82f6;
            font-size: 1em;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #3b82f6;
            font-size: 1em;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }
        
        .form-input::placeholder {
            color: rgba(59, 130, 246, 0.6);
        }
        
        .btn {
            display: inline-block;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }
        
        .btn-secondary {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.4);
        }
        
        .btn-secondary:hover {
            background: rgba(59, 130, 246, 0.3);
            transform: translateY(-1px);
        }
        
        .alerts {
            margin-bottom: 20px;
        }
        
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 0.9em;
            border: 1px solid;
        }
        
        .alert-success {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border-color: rgba(34, 197, 94, 0.3);
        }
        
        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.3);
        }
        
        .alert-info {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border-color: rgba(59, 130, 246, 0.3);
        }
        
        .back-button {
            display: inline-block;
            color: #3b82f6;
            text-decoration: none;
            font-size: 1em;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        
        .back-button:hover {
            color: #2563eb;
            transform: translateX(-5px);
        }
        
        @media (max-width: 768px) {
            .profile-container {
                padding: 15px;
            }
            
            .profile-card {
                padding: 20px;
            }
            
            .profile-header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <!-- ハンバーガーメニュー -->
    <div class="hamburger-menu" id="hamburgerMenu">
        <div class="hamburger-icon">
            <div class="hamburger-line"></div>
            <div class="hamburger-line"></div>
            <div class="hamburger-line"></div>
        </div>
    </div>

    <!-- サイドバー -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-close-button" id="sidebarCloseButton">
            <div class="close-icon">
                <div class="close-line"></div>
                <div class="close-line"></div>
                <div class="close-line"></div>
            </div>
        </div>
        <div class="sidebar-content">
            <a href="{% url 'kintai_top' %}" class="sidebar-mypage-button">マイページ</a>
            <a href="{% url 'logout' %}" class="sidebar-logout-button">ログアウト</a>
        </div>
    </div>

    <!-- サイドバーオーバーレイ -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="profile-container">
        <a href="{% url 'kintai_top' %}" class="back-button">← マイページに戻る</a>
        
        <div class="profile-header">
            <h1>プロフィール</h1>
            <p>パスワード変更</p>
        </div>
        
        <div class="profile-card">
            <div class="user-info">
                <h2>{{ user.username }}さん</h2>
                <p>ログイン中のユーザー</p>
            </div>
            
            <!-- メッセージ表示 -->
            {% if messages %}
            <div class="alerts">
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {% if message.tags == 'success' %}✅{% elif message.tags == 'error' %}❌{% else %}ℹ️{% endif %}
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}
            
            <form method="post" class="password-form">
                {% csrf_token %}
                <div class="form-group">
                    <label for="old_password" class="form-label">現在のパスワード</label>
                    <input type="password" id="old_password" name="old_password" class="form-input" placeholder="現在のパスワードを入力" required>
                </div>
                
                <div class="form-group">
                    <label for="new_password1" class="form-label">新しいパスワード</label>
                    <input type="password" id="new_password1" name="new_password1" class="form-input" placeholder="新しいパスワードを入力" required>
                </div>
                
                <div class="form-group">
                    <label for="new_password2" class="form-label">新しいパスワード（確認）</label>
                    <input type="password" id="new_password2" name="new_password2" class="form-input" placeholder="新しいパスワードを再入力" required>
                </div>
                
                <button type="submit" class="btn btn-primary">パスワードを変更</button>
            </form>
        </div>
    </div>
    
    <script src="{% static 'kintai/script.js' %}"></script>
</body>
</html>
