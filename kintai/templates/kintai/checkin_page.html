{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>入店報告</title>
    <link rel="stylesheet" href="{% static 'kintai/style.css' %}">
    <style>
        .back-button {
            width: 100%;
            box-sizing: border-box;
            padding: 15px;
            font-size: 1.1em;
            border: solid #26a69a 2px;
            border-radius: 25px;
            color: #26a69a; 
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: block;
            text-align: center;
            transition: transform 0.1s ease-out, background-color 0.1s ease-out;
        }
        
        .back-button:hover {
            color: #2563eb;
            transform: translateX(-5px);
        }
    </style>
</head>
<body>
    <!-- ハンバーガーメニュー -->
    <div class="hamburger-menu" id="hamburgerMenu">
        <div class="hamburger-icon">
            <div class="hamburger-line"></div>
            <div class="hamburger-line"></div>
            <div class="hamburger-line"></div>
        </div>
    </div>

        <!-- サイドバー -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-close-button" id="sidebarCloseButton">
                <div class="close-icon">
                    <div class="close-line"></div>
                    <div class="close-line"></div>
                    <div class="close-line"></div>
                </div>
            </div>
            <div class="sidebar-content">
                <a href="{% url 'logout' %}" class="sidebar-logout-button">ログアウト</a>
            </div>
        </div>

    <!-- サイドバーオーバーレイ -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <header>
        <h1>入店報告</h1>
    </header>

    <main>
        <div class="welcome-message">
            <p>{{ user.username }}さん、入店報告をしてください。</p>
        </div>

        <!-- エラーメッセージ表示 -->
        {% if error_message %}
            <div class="error-message">
                <h3>{{ error_message }}</h3>
            </div>
        {% endif %}

        {% if form %}
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                <div id="image-preview-container" class="photo-container">
                    <img id="preview-image" src="{% static 'kintai/images/no_image.svg' %}" alt="No Image" class="preview-image">
                </div>

                <!-- カメラ専用のファイル入力（ファイル選択は無効） -->
                <input type="file" 
                       accept="image/*" 
                       id="photo-upload-input" 
                       name="upload_img" 
                       multiple="false"
                       capture="environment"
                       style="display: none !important;"
                       webkitdirectory="false"
                       directory="false">
                
                <div class="button-group">
                    <button type="button" id="camera-button" class="action-button">写真撮影</button>
                    
                    <button type="submit" class="action-button">報告</button>

                    <a href="{% url 'kintai_top' %}" class="back-button">← マイページに戻る</a>
                </div>
            </form>
        {% else %}
            <div class="button-group">
                <a href="{% url 'kintai_top' %}" class="action-button">マイページに戻る</a>
            </div>
        {% endif %}
        </main>

    <script src="{% static 'kintai/script.js' %}"></script>
</body>
</html>
