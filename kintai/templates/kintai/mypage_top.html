{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{% static 'kintai/style.css' %}">
</head>
<body>
    <header>
        <h1>{{ title }}</h1>
        <div class="logout-section" style="position: absolute; top: 20px; right: 20px;">
            <a href="{% url 'logout' %}" class="logout-button" style="display: inline-block; padding: 8px 16px; background: rgba(255, 0, 0, 0.2); border: 1px solid rgba(255, 0, 0, 0.5); color: #ff6b6b; text-decoration: none; border-radius: 8px; transition: all 0.3s ease; font-size: 0.9em;">ログアウト</a>
        </div>
    </header>

    <main>
        <div class="welcome-message">
            <p>{{ message }}</p>
            <h2>{{ user.username }}さん</h2>
        </div>
        
        <div class="button-group">
            <a href="{% url 'kintai_checkin' %}" class="action-button">出勤</a>
            <a href="{% url 'kintai_checkout' %}" class="action-button">退勤</a>
            <a href="{% url 'kintai_performance' %}" class="action-button">個人実績</a>
            <a href="{% url 'team_performance' %}" class="action-button">実績一覧</a>
            {% if user.is_staff %}
            <a href="{% url 'admin_dashboard' %}" class="action-button" style="background: rgba(0, 255, 136, 0.2); border: 1px solid rgba(32, 182, 112, 0.5); color: #11c873;">管理者画面</a>
            {% endif %}
        </div>
    </main>
    
    <script src="{% static 'kintai/script.js' %}"></script>
</body>
</html>
