{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>退勤完了</title>
    <link rel="stylesheet" href="{% static 'kintai/style.css' %}">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
        }

        .complete-container {
            width: 100%;
            max-width: 400px;
            padding: 24px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: #4ade80;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .success-icon svg {
            width: 40px;
            height: 40px;
            color: white;
        }

        .complete-title {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
            color: white;
        }

        .user-name {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.9);
            margin: 0;
        }

        .complete-message {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.9);
            margin: 0;
        }

        .action-button {
            display: inline-block;
            background: white;
            color: #6366f1;
            padding: 16px 32px;
            border-radius: 9999px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            border: none;
            width: 100%;
            max-width: 280px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .action-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        @media (max-width: 768px) {
            .complete-container {
                padding: 20px;
            }

            .success-icon {
                width: 64px;
                height: 64px;
            }

            .success-icon svg {
                width: 32px;
                height: 32px;
            }

            .complete-title {
                font-size: 22px;
            }

            .user-name {
                font-size: 18px;
            }

            .complete-message {
                font-size: 14px;
            }

            .action-button {
                padding: 14px 28px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="complete-container">
        <div class="success-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
            </svg>
        </div>

        <h1 class="complete-title">退勤完了</h1>
        
        <div class="user-info">
            <p class="user-name">{{ user.username }}さんの</p>
            <p class="complete-message">退勤報告を受け付けました。</p>
        </div>

        <a href="{% url 'kintai_top' %}" class="action-button">マイページに戻る</a>
    </div>
</body>
</html>
