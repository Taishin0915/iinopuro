<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF--8">
    <title>レポート一覧</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .report { border: 1px solid #ccc; border-radius: 5px; padding: 15px; margin-bottom: 15px; }
        .report h2 { margin: 0 0 10px 0; }
        .report small { color: #555; }
    </style>
</head>
<body>
    <h1>レポート一覧</h1>

    {% for report in reports %}
        <div class="report">
            <h2>
                {{ report.get_report_type_display }} - 
                {{ report.carrier.carrier_name }}
            </h2>
            <p>
                <strong>担当者:</strong> {{ report.user.username }}<br>
                <strong>作業日:</strong> {{ report.work_date }}
            </p>
            <small>作成日時: {{ report.created_at }}</small>
        </div>
    {% empty %}
        <p>レポートはまだありません。</p>
    {% endfor %}

</body>
</html>
