{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{% static 'kintai/style.css' %}">
</head>
<body class="admin-page">
    <div class="logout-section">
        <a href="{% url 'logout' %}" class="logout-button">ログアウト</a>
    </div>
    
    <div class="admin-container">
        <div class="admin-header">
            <h1>{{ title }}</h1>
            <p>ユーザー管理と個人実績一覧</p>
        </div>
        
        <nav class="admin-nav">
            <a href="{% url 'admin_dashboard' %}" class="nav-button">ダッシュボード</a>
            <a href="{% url 'admin_users' %}" class="nav-button">ユーザー管理</a>
            <a href="{% url 'admin_attendance_management' %}" class="nav-button">稼働管理</a>
            <a href="{% url 'admin_carriers' %}" class="nav-button">キャリア管理</a>
        </nav>
        
        <div class="admin-content">
            {% if user_stats %}
            <div class="user-grid">
                {% for user, stats in user_stats.items %}
                <div class="user-card">
                    <div class="user-name">{{ user.username }}</div>
                    <a href="{% url 'admin_user_performance' user.id %}" class="user-button">個人実績を見る</a>
                </div>
                {% endfor %}
            </div>
            {% else %}
            <div class="no-data">
                <p>ユーザーデータがありません。</p>
            </div>
            {% endif %}
        </div>
        
        <!-- ダッシュボードに戻るボタン（下部） -->


        <div class="bottom-navigation">
            <a href="{% url 'admin_create_user' %}" class="nav-button create-user-button">新規ユーザー作成</a>
        </div>
        <div class="bottom-navigation">
            <a href="{% url 'admin_dashboard' %}" class="nav-button">← ダッシュボードに戻る</a>
        </div>
        
        <!-- 新規ユーザー作成ボタン -->
        
        
        <!-- MyPageに戻るボタン（下部） -->
        <div class="bottom-navigation">
            <a href="{% url 'kintai_top' %}" class="nav-button">← MyPageに戻る</a>
        </div>
    </div>
</body>
</html>
